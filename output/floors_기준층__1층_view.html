    tip.style.top=(r.bottom+6)+'px';});
  q.addEventListener('mouseleave',function(){tip.style.display='none';});
});
const w=document.getElementById('w'),s=w.querySelector('svg');
let sc=1,tx=0,ty=0,dr=false,px=0,py=0;
function ap(){s.style.transform='translate('+tx+'px,'+ty+'px) scale('+sc+')';}
w.addEventListener('wheel',function(e){e.preventDefault();
  const r=w.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const f=e.deltaY<0?1.15:1/1.15;tx=mx-(mx-tx)*f;ty=my-(my-ty)*f;sc*=f;ap();},{passive:false});
w.addEventListener('mousedown',function(e){dr=true;px=e.clientX;py=e.clientY;w.classList.add('drag');});
window.addEventListener('mouseup',function(){dr=false;w.classList.remove('drag');});
window.addEventListener('mousemove',function(e){if(!dr)return;tx+=e.clientX-px;ty+=e.clientY-py;px=e.clientX;py=e.clientY;ap();});
</script>

<script>
const tip=document.getElementById('tip');
document.querySelectorAll('.q[data-tip]').forEach(function(q){
  q.addEventListener('mouseenter',function(){tip.textContent=q.dataset.tip;tip.style.display='block';
    var r=q.getBoundingClientRect();
    tip.style.left=Math.max(8,Math.min(r.left,window.innerWidth-296))+'px';
    tip.style.top=(r.bottom+6)+'px';});
  q.addEventListener('mouseleave',function(){tip.style.display='none';});
});
const w=document.getElementById('w'),s=w.querySelector('svg');
s.removeAttribute('width');s.removeAttribute('height');s.setAttribute('preserveAspectRatio','xMidYMid meet');
var p=(s.getAttribute('viewBox')||'0 0 100 100').split(/[ ,]+/).map(Number);
var vb={x:p[0],y:p[1],w:p[2],h:p[3]};
function ap(){s.setAttribute('viewBox',vb.x+' '+vb.y+' '+vb.w+' '+vb.h);}
w.addEventListener('wheel',function(e){e.preventDefault();
  var r=s.getBoundingClientRect(),mx=(e.clientX-r.left)/r.width,my=(e.clientY-r.top)/r.height;
  var cx=vb.x+mx*vb.w,cy=vb.y+my*vb.h,f=e.deltaY<0?1/1.15:1.15;
  vb.w*=f;vb.h*=f;vb.x=cx-mx*vb.w;vb.y=cy-my*vb.h;ap();},{passive:false});
var dr=false,lx,ly;
w.addEventListener('mousedown',function(e){dr=true;lx=e.clientX;ly=e.clientY;w.classList.add('drag');});
window.addEventListener('mouseup',function(){dr=false;w.classList.remove('drag');});
window.addEventListener('mousemove',function(e){if(!dr)return;var r=s.getBoundingClientRect();
  vb.x-=(e.clientX-lx)/r.width*vb.w;vb.y-=(e.clientY-ly)/r.height*vb.h;lx=e.clientX;ly=e.clientY;ap();});
document.querySelectorAll('.legend input[data-g]').forEach(function(cb){cb.onchange=function(){
  var g=cb.dataset.g;
  s.querySelectorAll('[id="'+g+'"],[id^="'+g+'-"]').forEach(function(el){el.style.display=cb.checked?'':'none';});};});
// 부모(카드)에서 라벨 클릭 → 그 불연속(issue-N) 색 강조 / 체크박스 → 화면에서 숨김
function _drawn(g){return g.tagName.toLowerCase()==='g'?g.querySelectorAll('path,rect,line,polyline'):[g];}
function setHL(id,on){
  s.querySelectorAll('[id="'+id+'"]').forEach(function(g){
    _drawn(g).forEach(function(e){
      if(on){ if(e.getAttribute('data-o')===null) e.setAttribute('data-o', e.getAttribute('style')||'');
               e.style.fill='#00e676'; e.style.stroke='#00a000'; e.style.strokeWidth='3'; e.style.opacity='1'; }
      else { e.setAttribute('style', e.getAttribute('data-o')||''); e.removeAttribute('data-o'); }
    });
  });
}
function setVis(id,show){
  s.querySelectorAll('[id="'+id+'"]').forEach(function(g){g.style.display=show?'':'none';});
}
window.addEventListener('message',function(e){
  var d=e.data||{};
  if(d.type==='hl') setHL(d.id,d.on);
  else if(d.type==='vis') setVis(d.id,d.show);
});
// 글씨 크기 조절 (svg.fonttype='none' 으로 <text> 출력된 라벨을 배율 조정)
var _fs=1;
function _scaleText(m){_fs=Math.max(0.3,Math.min(6,_fs*m));
  s.querySelectorAll('text').forEach(function(t){
    var b=t.getAttribute('data-fs0');
    if(b===null){b=parseFloat(t.style.fontSize||getComputedStyle(t).fontSize)||10;t.setAttribute('data-fs0',b);}
    t.style.fontSize=(b*_fs)+'px';});}
var _fu=document.getElementById('fup'),_fd=document.getElementById('fdn');
if(_fu)_fu.onclick=function(){_scaleText(1.25);};
if(_fd)_fd.onclick=function(){_scaleText(0.8);};
</script>
